enable: true
heading:
  title: "Holonic Dashboard"
  subtitle: "Navigate Your Interdependent Network of Places"

description: |
  A powerful visual interface to monitor resource flows, track regenerative impacts, and navigate the living network
  of interconnected Holons. See the full spectrum of value exchanges—financial, material, labor, expertise, and
  ecological regeneration—flowing through your community.

features:
  - title: "Multi-Resource Flows"
    description: "Visualize exchanges across all resource types: money, labor, materials, land, expertise, and regenerative impacts. Watch value flow through sophisticated multi-hop exchanges."
    icon: "ti-exchange-vertical"

  - title: "Regenerative Impact Tracking"
    description: "Monitor positive externalities and regenerative actions—trees planted, plastic removed, carbon sequestered, soil restored—as recognized value within the network."
    icon: "ti-world"

  - title: "Network Health Indicators"
    description: "Track the health of the whole organism. See how each Holon contributes to and benefits from collective abundance, with early signals for imbalances."
    icon: "ti-pulse"

  - title: "Needs & Subscriptions"
    description: "Explore collective needs across the network, subscribe to solutions you want to see manifested, and discover how your contributions address others' expressed needs."
    icon: "ti-heart"

